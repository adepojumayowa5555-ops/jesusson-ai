<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jesus'son AI | Full Access</title>
    <style>
        :root {
            --bg-dark: #0d1117;
            --sidebar-bg: #161b22;
            --accent: #2f81f7;
            --text-main: #e6edf3;
            --border: #30363d;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg-dark); color: var(--text-main);
            font-family: -apple-system, sans-serif; overflow: hidden;
        }

        .main-wrapper { display: flex; height: 100vh; width: 100vw; }

        aside {
            width: 260px; background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 15px;
        }

        .new-chat-btn {
            border: 1px solid var(--border); border-radius: 5px;
            padding: 10px; text-align: center; cursor: pointer; margin-bottom: 20px;
        }

        .history-list { flex-grow: 1; font-size: 13px; color: #8b949e; overflow-y: auto; }

        main { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-dark); }
        
        #chat-window {
            flex-grow: 1; overflow-y: auto; padding: 40px 15%;
            display: flex; flex-direction: column; gap: 20px;
        }

        .msg { max-width: 85%; padding: 15px; border-radius: 10px; line-height: 1.6; }
        .user-msg { align-self: flex-end; background: #1f6feb; }
        .ai-msg { align-self: flex-start; background: transparent; border: 1px solid var(--border); }

        .input-container { padding: 20px 15% 40px 15%; background: var(--bg-dark); }

        .input-box {
            background: #21262d; border: 1px solid var(--border);
            border-radius: 15px; display: flex; align-items: center; padding: 10px 15px;
        }

        input {
            flex-grow: 1; background: transparent; border: none; color: white;
            padding: 10px; outline: none; font-size: 16px;
        }

        .icon-btn { cursor: pointer; padding: 8px; color: #8b949e; font-size: 20px; }
        
        #image-preview { display: none; width: 50px; height: 50px; border-radius: 5px; margin-right: 10px; object-fit: cover; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <aside>
        <div class="new-chat-btn" onclick="location.reload()">+ New Chat</div>
        <div class="history-list" id="history-list"></div>
    </aside>

    <main>
        <div id="chat-window">
            <div class="msg ai-msg">Welcome, Mayowa. I am Jesus'son AI. My brain is ready.</div>
        </div>

        <div class="input-container">
            <div class="input-box">
                <label for="img-upload" class="icon-btn">📎</label>
                <input type="file" id="img-upload" hidden accept="image/*" onchange="previewImage(event)">
                <img id="image-preview">
                <input type="text" id="userInput" placeholder="Ask me anything...">
                <button class="icon-btn" onclick="askJesusson()" style="background:transparent; border:none;">➔</button>
            </div>
        </div>
    </main>
</div>

<script type="module">
  import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

  const API_KEY = "AIzaSyB9b93RQoOu_U_hBSD2Y02EFUfPAzOjSA0";
  const genAI = new GoogleGenerativeAI(API_KEY);
  
  let chatSession = null;
  let selectedImageData = null;

  async function initChat() {
      try {
          const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
          chatSession = model.startChat({ history: [] });
          console.log("Jesus'son AI Brain initialized.");
      } catch (err) {
          console.error("Initialization failed:", err);
      }
  }
  initChat();

  window.previewImage = function(event) {
      const file = event.target.files[0];
      const reader = new FileReader();
      reader.onload = function() {
          document.getElementById('image-preview').src = reader.result;
          document.getElementById('image-preview').style.display = 'block';
          selectedImageData = {
              inlineData: { data: reader.result.split(',')[1], mimeType: file.type }
          };
      };
      reader.readAsDataURL(file);
  };

  window.askJesusson = async function() {
      const inputField = document.getElementById('userInput');
      const text = inputField.value;
      if (!text && !selectedImageData) return;

      const chatWindow = document.getElementById('chat-window');
      chatWindow.innerHTML += `<div class="msg user-msg">${text}</div>`;
      
      const loadingId = "load-" + Date.now();
      chatWindow.innerHTML += `<div class="msg ai-msg" id="${loadingId}">Jesus'son is thinking...</div>`;
      chatWindow.scrollTop = chatWindow.scrollHeight;

      inputField.value = "";
      document.getElementById('image-preview').style.display = 'none';

      try {
          let result;
          if (selectedImageData) {
              const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
              result = await model.generateContent([text || "What is in this image?", selectedImageData]);
              selectedImageData = null;
          } else {
              result = await chatSession.sendMessage(text);
          }
          const response = await result.response;
          document.getElementById(loadingId).innerText = response.text();
      } catch (e) {
          document.getElementById(loadingId).innerText = "Connection error. Ensure your VPN is set to USA.";
          console.error(e);
      }
      chatWindow.scrollTop = chatWindow.scrollHeight;
  };

  document.getElementById('userInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') askJesusson();
  });
</script>

</body>
</html>
